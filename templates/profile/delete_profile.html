{% extends "base.html" %}
{% block title %}Delete Profile{% endblock %}
{% block subtitle %}Delete profile{% endblock %}

{% block content %}

<div class="section-title">Delete profile</div>

<div class="app-card text-center">
  <div class="mb-3 fw-semibold">
    Delete your account?
  </div>

  <div class="text-muted-app small mb-4">
    Your account will be deleted forever.
  </div>

  <!-- Delete Form -->
  <form method="POST" action="{{ url_for('auth_profile.delete_profile_submit') }}">
    <button type="submit" class="btn btn-dark w-100">
      Delete
    </button>
  </form>

  <!-- Cancel -->
  <div class="mt-3">
    <a class="small text-decoration-none" href="{{ url_for('auth_profile.view_profile') }}">
      Cancel
    </a>
  </div>

</div>

{% endblock %}
