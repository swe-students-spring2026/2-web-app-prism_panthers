{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block subtitle %}We’ll send a reset link{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-title">Forgot Password</div>

  <div class="auth-card">
    <form class="auth-form" method="POST" action="{{ url_for('auth_profile.forgot_password_submit') }}">
      <div class="auth-field">
        <label>Email</label>
        <input class="auth-input" type="email" name="email" placeholder="you@nyu.edu" required>
      </div>

      <button class="auth-btn primary full" type="submit">Send reset link</button>
    </form>

    <p class="auth-hint">
      If this email exists, we’ll send a reset link.
    </p>

    <div class="auth-foot">
      <a href="{{ url_for('auth_profile.login') }}">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
