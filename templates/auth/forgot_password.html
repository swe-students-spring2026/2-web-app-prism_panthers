{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block subtitle %}We’ll send a reset link{% endblock %}

{% block content %}
  <div class="section-title">Forgot Password</div>

  <div class="app-card">
    <form method="POST" action="{{ url_for('auth_profile.forgot_password_submit') }}">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required />
      </div>

      <button class="btn btn-dark w-100" type="submit">
        Send link
      </button>
    </form>

    <!-- DEMO BUTTON -->
    <a class="btn btn-outline-secondary w-100 mt-2" href="/ui/update-password">
      View Demo (Skip Email)
    </a>

   <div class="text-center mt-3">
      <a class="small text-decoration-none" href="{{ url_for('auth_profile.login') }}">
        Back to Sign In
      </a>
    </div>

    {% if reset_link %}
      <hr class="my-3" />
      <div class="small text-muted-app">
        Dev mode reset link:
        <a href="{{ reset_link }}">{{ reset_link }}</a>
      </div>
    {% endif %}
  </div>
{% endblock %}
