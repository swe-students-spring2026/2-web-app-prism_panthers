{% extends "base.html" %}

{% block title %}Sign In{% endblock %}
{% block subtitle %}Welcome back{% endblock %}

{% block content %}
  <div class="section-title">Sign In</div>

  <div class="app-card">
    <!-- real form -->
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          name="email"
          class="form-control"
          placeholder="you@nyu.edu"
          required
          autofocus
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="btn btn-dark w-100">
        Sign In
      </button>
    </form>

    <!-- Demo button -->
    <a href="/ui/profile" class="btn btn-outline-secondary w-100 mt-2">
      View Demo (Skip Login)
    </a>

    <div class="d-flex justify-content-between mt-3">
      <a class="small text-decoration-none" href="{{ url_for('register') }}">
        Create account
      </a>
      <a class="small text-decoration-none" href="{{ url_for('forgot_password') }}">
        Forgot password?
      </a>
    </div>
  </div>
{% endblock %}
