{% extends "base.html" %}

{% block title %}Sign In{% endblock %}
{% block subtitle %}Welcome back{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-title">Sign In</div>

  <div class="auth-card">
    <form class="auth-form" method="POST" action="{{ url_for('auth_profile.login_submit') }}">
      <div class="auth-field">
        <label>Email</label>
        <input class="auth-input"
          type="email"
          name="email"
          placeholder="you@nyu.edu"
          required
          autofocus
        />
      </div>

      <div class="auth-field">
        <label>Password</label>
        <input class="auth-input"
          type="password"
          name="password"
          class="form-control"
          placeholder="••••••••"
          required
        />
      </div>

      <button class="auth-btn primary full" type="submit">
        Sign In
      </button>
    </form>


    <!-- Demo button -->
    <a href="/ui/profile" class="btn btn-outline-secondary w-100 mt-2">
      View Demo (Skip Login)
    </a>

    <div class="d-flex justify-content-between mt-3">
      <a class="small text-decoration-none" href="{{ url_for('auth_profile.register') }}">

    <div class="auth-links">
      <a href="{{ url_for('auth_profile.register') }}">
        Create account
      </a>
      <a href="{{ url_for('auth_profile.forgot_password') }}">
        Forgot password?
      </a>
    </div>
  </div>
</div>
{% endblock %}
