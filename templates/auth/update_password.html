{% extends "base.html" %}
{% block title %}Update Password{% endblock %}
{% block subtitle %}Update password{% endblock %}

{% block content %}

<div class="section-title">Update password</div>

<div class="app-card">

  <!-- Main button (demo POST) -->
  <form method="POST" action="/update-password-demo">
    <div class="mb-3">
      <label class="form-label">New password</label>
      <input type="password" name="new_password" class="form-control" required />
    </div>

    <div class="mb-4">
      <label class="form-label">Confirm password</label>
      <input type="password" name="confirm_password" class="form-control" required />
    </div>

    <button type="submit" class="btn btn-dark w-100">
      Update password
    </button>
  </form>

  <!-- Demo button (also triggers flash + redirect) -->
  <form method="POST" action="/update-password-demo" class="mt-3">
    <button type="submit" class="btn btn-outline-secondary w-100">
      View Demo (Skip Update)
    </button>
  </form>

</div>

{% endblock %}
