{% extends "base.html" %}
{% block title %}Update Password{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-title">Update Password</div>

  <div class="auth-card">
    <form class="auth-form"
          method="POST"
          action="{% if token %}{{ url_for('auth_profile.reset_password_submit', token=token) }}{% else %}{{ url_for('auth_profile.update_password_submit') }}{% endif %}">

      {% if not token %}
        <div class="auth-field">
          <label>Current Password</label>
          <input class="auth-input" type="password" name="current_password" placeholder="Current password" required>
        </div>
      {% endif %}

      <div class="auth-field">
        <label>New Password</label>
        <input class="auth-input" type="password" name="new_password" placeholder="New password" required>
      </div>

      <div class="auth-field">
        <label>Confirm Password</label>
        <input class="auth-input" type="password" name="confirm_password" placeholder="Confirm password" required>
      </div>

      <button class="auth-btn primary full" type="submit">Update Password</button>
    </form>

    <div class="auth-foot">
      {% if token %}
        <a href="{{ url_for('auth_profile.login') }}">Back to Sign In</a>
      {% else %}
        <a href="{{ url_for('auth_profile.view_profile') }}">Back to Profile</a>
      {% endif %}
    </div>
  </div>
</div>
{% endblock %}
