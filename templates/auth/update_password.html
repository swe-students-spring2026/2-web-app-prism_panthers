{% extends "base.html" %}
{% block title %}Update Password{% endblock %}
{% block subtitle %}Choose a new password{% endblock %}

{% block content %}
  <div class="section-title">Update Password</div>

  <div class="app-card">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">New password</label>
        <input type="password" name="new_password" class="form-control" required />
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm new password</label>
        <input type="password" name="confirm_password" class="form-control" required />
      </div>

      <button class="btn btn-dark w-100" type="submit">Update password</button>

      <div class="text-center mt-3">
        <a class="small text-decoration-none" href="{{ url_for('auth_profile.login') }}">Back to Sign In</a>
      </div>
    </form>
  </div>
{% endblock %}
