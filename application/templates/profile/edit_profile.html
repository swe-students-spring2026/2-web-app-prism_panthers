{% extends "base.html" %}
{% block title %}Edit Profile{% endblock %}
{% block subtitle %}Edit your info{% endblock %}

{% block content %}

  <!-- Top card (matches your profile/home card style) -->
  <!-- Profile -->
<div class="app-card mb-4">

  <div class="d-flex gap-3">

    <!-- Profile Photo -->
    <div style="
        width:120px;
        height:120px;
        border-radius:50%;
        background:#ddd;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:600;
        color:#555;">
      Profile Photo
    </div>

    <!-- Name + School Info -->
    <div class="flex-grow-1">

      <div class="fw-bold fs-5">
        Full name <span class="text-muted-app">★</span>
      </div>

      <div class="mt-2">
        University / Major
      </div>

      <div class="text-muted-app">
        Graduation year
      </div>

    </div>
  </div>

    <!-- Change photo (demo button) -->
    <div class="mt-3">
      <form method="POST" action="{{ url_for('demo_change_photo') }}" class="mt-3">
        <button type="submit" class="btn btn-outline-dark w-100">
            Change Profile Photo
        </button>
      </form>
    </div>
  </div>

  <!-- Profile fields -->
  <div class="section-title">Edit Profile</div>
  <div class="app-card mb-4">
    <!-- Demo submit: posts to your demo route and flashes "Profile successfully updated" -->
    <form method="POST" action="/ui/update-profile">
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input type="text" name="full_name" class="form-control" placeholder="Full name" />
      </div>

      <div class="mb-3">
        <label class="form-label">University</label>
        <input type="text" name="university" class="form-control" placeholder="University" />
      </div>

      <div class="mb-3">
        <label class="form-label">Major</label>
        <input type="text" name="major" class="form-control" placeholder="Major" />
      </div>

      <div class="mb-3">
        <label class="form-label">Graduation year</label>
        <input type="text" name="grad_year" class="form-control" placeholder="2026" />
      </div>

      <div class="mb-3">
        <label class="form-label">Bio</label>
        <textarea name="bio" rows="3" class="form-control" placeholder="Short bio..."></textarea>
      </div>

      <button type="submit" class="btn btn-dark w-100">
        Save changes
      </button>
    </form>

    <a href="/ui/update-password" class="btn btn-outline-dark w-100 mt-2">
      Update password
    </a>
  </div>

  <!-- Danger zone -->
  <div class="app-card">
    <a href="/ui/login" class="btn btn-outline-danger w-100">
      Log out
    </a>

    <div class="text-center mt-3">
      <a href="/ui/delete-profile" class="text-danger text-decoration-underline">
        Delete profile
      </a>
    </div>
  </div>

{% endblock %}
